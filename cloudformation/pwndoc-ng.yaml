AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  PwnDoc-NG on EC2 with Docker Compose.
  Deploys VPC, EC2 instance, EBS volume for MongoDB, EIP, DLM backup policy, and CloudWatch alarms.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
    Description: EC2 instance type

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access

  SSHAllowedCIDR:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to SSH (restrict to your IP/32)
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  EBSVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 500
    Description: MongoDB EBS volume size in GB

  MongoRootPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: MongoDB root password (min 12 characters)

  MongoAppPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: MongoDB application user password (min 12 characters)

  JWTSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: JWT signing secret (generate with openssl rand -hex 32)

  JWTRefreshSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: JWT refresh token secret (generate with openssl rand -hex 32)

  GitRepoURL:
    Type: String
    Default: https://github.com/pwndoc-ng/pwndoc-ng.git
    Description: Git repository URL

  GitBranch:
    Type: String
    Default: main
    Description: Git branch to deploy

  DomainName:
    Type: String
    Default: ''
    Description: Optional domain name for Route 53 A record

  HostedZoneId:
    Type: String
    Default: ''
    Description: Route 53 hosted zone ID (required if DomainName is set)

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref HostedZoneId, '']]

# =============================================================================
# Mappings — Latest Amazon Linux 2023 AMI per region
# =============================================================================
Mappings:
  RegionAMI:
    us-east-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-east-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    us-west-2:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-west-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    eu-central-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    ap-southeast-1:
      AMI: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

# =============================================================================
# Resources
# =============================================================================
Resources:

  # --- Networking ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-public-rt'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- Security Group ---
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PwnDoc-NG application security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowedCIDR
          Description: SSH
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: All outbound
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app-sg'

  # --- EBS Volume for MongoDB ---
  MongoDataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: !Ref EBSVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-mongo-data'

  # --- EC2 Instance ---
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-app'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          # Log all output
          exec > >(tee /var/log/pwndoc-setup.log) 2>&1
          echo "=== PwnDoc-NG Setup Started $(date) ==="

          # --- Install Docker ---
          dnf update -y
          dnf install -y docker git

          systemctl enable docker
          systemctl start docker

          # Install Docker Compose v2 plugin
          mkdir -p /usr/local/lib/docker/cli-plugins
          COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -SL "https://github.com/docker/compose/releases/download/${!COMPOSE_VERSION}/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # --- Mount EBS volume for MongoDB data ---
          EBS_DEVICE="/dev/xvdf"
          MOUNT_POINT="/mnt/mongo-data"

          # Wait for device to appear
          for i in $(seq 1 30); do
            if [ -b "$EBS_DEVICE" ] || [ -b "/dev/nvme1n1" ]; then
              break
            fi
            sleep 2
          done

          # NVMe devices may appear as /dev/nvme1n1
          if [ -b "/dev/nvme1n1" ]; then
            EBS_DEVICE="/dev/nvme1n1"
          fi

          # Format only if no filesystem exists
          if ! blkid "$EBS_DEVICE"; then
            mkfs.xfs "$EBS_DEVICE"
          fi

          mkdir -p "$MOUNT_POINT"
          mount "$EBS_DEVICE" "$MOUNT_POINT"
          echo "$EBS_DEVICE $MOUNT_POINT xfs defaults,nofail 0 2" >> /etc/fstab

          # --- Clone and configure application ---
          APP_DIR="/opt/pwndoc-ng"
          git clone -b "${GitBranch}" "${GitRepoURL}" "$APP_DIR"
          cd "$APP_DIR"

          # Create .env file
          cat > .env <<ENVEOF
          NODE_ENV=prod
          APP_PORT=4242
          COLLAB_WEBSOCKET_PORT=8440
          MONGO_HOST=mongo-pwndoc-ng
          MONGO_PORT=27017
          MONGO_DB_NAME=pwndoc
          MONGO_USERNAME=pwndoc
          MONGO_PASSWORD=${MongoAppPassword}
          MONGO_INITDB_ROOT_USERNAME=root
          MONGO_INITDB_ROOT_PASSWORD=${MongoRootPassword}
          JWT_SECRET=${JWTSecret}
          JWT_REFRESH_SECRET=${JWTRefreshSecret}
          CORS_ORIGIN=*
          BODY_LIMIT=20mb
          APIDOC=false
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' .env

          chmod 600 .env

          # Override mongo volume to use EBS mount
          cat > docker-compose.override.yml <<'OVERRIDE'
          version: '3.8'
          services:
            mongodb:
              volumes:
                - /mnt/mongo-data:/data/db
          OVERRIDE
          sed -i 's/^          //' docker-compose.override.yml

          # --- Generate self-signed SSL certs ---
          mkdir -p backend/ssl frontend/ssl
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout backend/ssl/server.key -out backend/ssl/server.cert \
            -subj "/CN=localhost"
          cp backend/ssl/server.key frontend/ssl/server.key
          cp backend/ssl/server.cert frontend/ssl/server.cert

          # --- Set up Docker log rotation first ---
          cat > /etc/docker/daemon.json <<'DAEMON'
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
          DAEMON
          systemctl restart docker

          # --- Start application ---
          docker compose -f docker-compose.prod.yml -f docker-compose.override.yml up -d --build

          # --- Create MongoDB application user ---
          echo "Waiting for MongoDB to be ready..."
          for i in $(seq 1 30); do
            if docker exec mongo-pwndoc-ng mongosh --eval "db.adminCommand('ping')" -u root -p "${MongoRootPassword}" --authenticationDatabase admin > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          docker exec mongo-pwndoc-ng mongosh -u root -p "${MongoRootPassword}" --authenticationDatabase admin --eval "
            db = db.getSiblingDB('pwndoc');
            db.createUser({
              user: 'pwndoc',
              pwd: '${MongoAppPassword}',
              roles: [{ role: 'readWrite', db: 'pwndoc' }]
            });
          "

          # --- Set up automatic security updates ---
          dnf install -y dnf-automatic
          systemctl enable --now dnf-automatic-install.timer

          # --- Signal CloudFormation ---
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource AppInstance --region ${AWS::Region}

          echo "=== PwnDoc-NG Setup Completed $(date) ==="
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M

  # --- EBS Volume Attachment ---
  MongoVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref AppInstance
      VolumeId: !Ref MongoDataVolume

  # --- Elastic IP ---
  AppEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref AppInstance
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-eip'

  # --- DLM Backup Policy ---
  DLMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: dlm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSDataLifecycleManagerServiceRole

  DLMLifecyclePolicy:
    Type: AWS::DLM::LifecyclePolicy
    Properties:
      Description: Daily EBS snapshots for MongoDB data
      State: ENABLED
      ExecutionRoleArn: !GetAtt DLMRole.Arn
      PolicyDetails:
        ResourceTypes:
          - VOLUME
        TargetTags:
          - Key: Name
            Value: !Sub '${AWS::StackName}-mongo-data'
        Schedules:
          - Name: daily-snapshot
            CreateRule:
              Interval: 24
              IntervalUnit: HOURS
              Times:
                - '03:00'
            RetainRule:
              Count: 7
            CopyTags: true

  # --- CloudWatch Alarms ---
  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-cpu-high'
      AlarmDescription: CPU utilization exceeds 80% for 15 minutes
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance

  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-status-check'
      AlarmDescription: Instance status check failed
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref AppInstance

  # --- Optional Route 53 ---
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref AppEIP

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance

  PublicIP:
    Description: Elastic IP address
    Value: !Ref AppEIP

  AppURL:
    Description: Application URL
    Value: !If
      - HasDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${AppEIP}'

  SSHCommand:
    Description: SSH command to connect
    Value: !Sub 'ssh -i ~/.ssh/${KeyPairName}.pem ec2-user@${AppEIP}'

  MongoVolumeId:
    Description: EBS volume ID for MongoDB data
    Value: !Ref MongoDataVolume

  SetupLog:
    Description: Check setup progress
    Value: 'ssh in and run: tail -f /var/log/pwndoc-setup.log'
